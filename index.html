<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DRS Simulation | Hawk-Eye Precision</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"></div>
    
    <div class="overlay">
      <h1>DRS SIMULATION</h1>
    </div>

    <div class="controls-panel">
      <div class="control-group">
        <label>Speed (KPH)</label>
        <input type="number" id="speed" value="145" min="80" max="160">
      </div>
      <div class="control-group">
        <label>Line</label>
        <input type="number" id="line" value="0.0" step="0.1" min="-1" max="1">
      </div>
      <div class="control-group">
        <label>Length</label>
        <input type="number" id="length" value="4.0" step="0.1" min="1" max="10">
      </div>
      <button id="bowlBtn" class="btn-bowl">BOWL</button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
