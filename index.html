<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DRS Simulation | Hawk-Eye Pro</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"></div>
    
    <div class="overlay-top">
      <div class="logo-box">
        <h1>HAWK-EYE <span class="pro-tag">PRO</span></h1>
        <div class="sub-title">DRS PREDICTIVE ENGINE v3.0</div>
      </div>
      <div class="ai-badge">REAL-TIME PHYSICS ENGINE ACTIVE</div>
    </div>

    <!-- DRS Decision Panel (Moved to Left) -->
    <div id="drsDecision" class="drs-panel drs-left" style="display:none;">
      <div class="decision-row" id="rowPitching">
        <span class="label">PITCHING</span>
        <span class="result">---</span>
      </div>
      <div class="decision-row" id="rowImpact">
        <span class="label">IMPACT</span>
        <span class="result">---</span>
      </div>
      <div class="decision-row" id="rowWickets">
        <span class="label">WICKETS</span>
        <span class="result">---</span>
      </div>
      <div class="final-decision" id="finalDecision">NOT OUT</div>
    </div>

    <div class="side-panel">
      <h2>Bowling Configuration</h2>
      
      <div class="control-group">
        <label>Bowler Handedness</label>
        <div class="ball-type-grid">
          <button class="bowler-hand-btn active" data-hand="right">Right Arm</button>
          <button class="bowler-hand-btn" data-hand="left">Left Arm</button>
        </div>
      </div>

      <div class="control-group">
        <label>Batsman Handedness</label>
        <div class="ball-type-grid">
          <button class="hand-btn active" data-hand="rhb">RHB</button>
          <button class="hand-btn" data-hand="lhb">LHB</button>
        </div>
      </div>

      <div class="control-group">
        <label>Ball Type</label>
        <div class="ball-type-grid">
          <button class="type-btn active" data-type="fast">FAST</button>
          <button class="type-btn" data-type="swing">SWING</button>
          <button class="type-btn" data-type="spin">SPIN</button>
          <button class="type-btn" data-type="topspin">TOP-SPIN</button>
          <button class="type-btn" data-type="cutter">CUTTER</button>
          <button class="type-btn" data-type="slower">SLOWER-BALL</button>
          <button class="type-btn" data-type="bouncer">BOUNCER</button>
          <button class="type-btn" data-type="knuckle">KNUCKLE-BALL</button>
        </div>
      </div>

      <div class="control-group">
        <label>Release Speed <span id="speedVal" class="value-display">145 km/h</span></label>
        <input type="range" id="speed" min="60" max="160" value="145">
      </div>

      <div class="control-group" id="swingControl" style="display:none;">
        <label id="swingLabel">Swing ( - Left / + Right )</label>
        <span id="swingVal" class="value-display">0.0</span>
        <input type="range" id="swing" min="-2" max="2" step="0.1" value="0">
      </div>

      <div class="control-group" id="spinControl" style="display:none;">
        <label id="turnLabel">Turn ( - Left / + Right )</label>
        <span id="turnVal" class="value-display">0.0</span>
        <input type="range" id="turn" min="-2" max="2" step="0.1" value="0">
      </div>

      <div class="control-group">
        <label>Trajectory Precision</label>
        <div class="help-text">Click on the pitch to set target marker</div>
      </div>

      <button id="bowlBtn" class="btn-bowl">BOWL NOW</button>
      <button id="reviewBtn" class="btn-review" style="display:none;">START REVIEW</button>
      <div style="display: flex; gap: 10px;">
        <button id="camBtn" class="btn-review" style="background:#444; flex: 1;">CAM</button>
        <button id="resetBtn" class="btn-review" style="background:#222; flex: 1;">RESET</button>
      </div>
      
      <div class="help-text">Simulation predicts path post-impact</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
